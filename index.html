<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cotizador Neobind</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f5f7;
  margin:0;
}

.container {
  max-width: 520px;
  margin: 40px auto;
  background: #fff;
  padding: 28px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

.logo { text-align:center; margin-bottom:20px; }
.logo img { width:130px; }

h2 { text-align:center; font-size:24px; margin-bottom:5px; font-weight:600; }

.subtitle {
  text-align:center;
  color:#888;
  font-size:14px;
  margin-bottom:25px;
}

input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  margin-bottom:25px;
}

/* 🎨 CARDS PREMIUM */
.colors {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:14px;
}

.color-card {
  position:relative;
  height:120px;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.color-card img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s;
}

.color-card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.55), transparent);
}

.color-name {
  position:absolute;
  bottom:10px;
  left:12px;
  color:#ffffff;
  font-weight:600;
  font-size:14px;
  z-index:2;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
}

.color-card:hover {
  transform:translateY(-4px);
}

.color-card.selected {
  outline:3px solid #111;
}

/* BOTONES */
button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#111;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

#wa { background:#25D366; }
#copyWA { background:#007AFF; }

.budget {
  margin-top:25px;
  background:#fafafa;
  padding:18px;
  border-radius:14px;
  font-size:14px;
  border:1px solid #eee;
  line-height:1.4;
}

.block { margin-bottom:14px; }
.block-title { font-weight:600; }
.total-destacado { font-weight:700; font-size:17px; }

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/NEO%20MARCA.png">
</div>

<h2>Cotizá tu pileta</h2>
<div class="subtitle">Venecitas Neobind</div>

<input type="number" id="m2Input" placeholder="Ingresá los m² (ej: 55)" />

<div class="colors">

<div class="color-card" onclick="sel(this,'Blanco Nácar','3619704621491762')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/blanco.jpg">
<div class="color-name">Blanco Nácar</div>
</div>

<div class="color-card" onclick="sel(this,'Agua Marina','3597377153718869')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/aguamarina.jpg">
<div class="color-name">Agua Marina</div>
</div>

<div class="color-card" onclick="sel(this,'Turquesa','3856030544515788')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/turquesa.jpg">
<div class="color-name">Turquesa</div>
</div>

<div class="color-card" onclick="sel(this,'Azul','3620251704771327')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/azul.jpg">
<div class="color-name">Azul</div>
</div>

<div class="color-card" onclick="sel(this,'Verde Esmeralda','4295199693857459')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/verde.jpg">
<div class="color-name">Verde Esmeralda</div>
</div>

<div class="color-card" onclick="sel(this,'Negro','3511570448947533')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/negro.jpg">
<div class="color-name">Negro</div>
</div>

<div class="color-card" onclick="sel(this,'Gris','3580942102015676')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/gris.jpg">
<div class="color-name">Gris</div>
</div>

<!-- CATÁLOGO -->
<div class="color-card" onclick="sel(this,'No definí aún','')">
<img src="https://raw.githubusercontent.com/Neobind737/Cotizador-Neobind/main/img/catalogo.jpg">
<div class="color-name">No definí aún</div>
</div>

</div>

<button onclick="calc()">Calcular presupuesto</button>

<div id="budget" class="budget" style="display:none;"></div>

<button id="copyWA" style="display:none;">📋 Copiar para WhatsApp</button>
<button id="wa" style="display:none;">📲 Quiero avanzar por WhatsApp</button>

</div>

<script>
let color = "";
let productId = "";
let whatsappText = "";

function sel(el, c, id){
  color = c;
  productId = id;
  document.querySelectorAll('.color-card').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}

function calc(){
  const m2 = Math.ceil(parseFloat(document.getElementById("m2Input").value));

  if(!m2 || m2<=0) return alert("Ingresá m² válidos");

  const colorTexto = color ? color : "Color a definir";

  const f = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");

  const venT = m2*20980;
  const venC = m2*25150;

  const cem = Math.ceil(m2/6);
  const jun = Math.ceil(m2/25);

  const matT = cem*37000 + jun*38000;
  const matC = cem*41500 + jun*43000;

  const totT = venT + matT;
  const totC = venC + matC;

  const txt = `
<div class="block">
🏊 <b>Presupuesto Neobind</b><br>
${m2} m² — ${colorTexto}
</div>

<div class="block">
📦 Envío GRATIS de venecitas
</div>

<div class="block">
<div class="block-title">💎 Venecitas</div>
Transferencia: $${f(venT)}<br>
Tarjeta: $${f(venC)} (3× $${f(venC/3)})
</div>

<div class="block">
<div class="block-title">🛠 Materiales</div>
${cem} Cemenpox + ${jun} Cemento Blanco<br>
Transferencia: $${f(matT)}<br>
Tarjeta: $${f(matC)}
</div>

<div class="block">
<div class="block-title">💰 Total</div>
<span class="total-destacado">Transferencia: $${f(totT)}</span><br>
Tarjeta: $${f(totC)} (3× $${f(totC/3)})
</div>

<div class="block">
⚡ Cotización válida por 3 días
</div>
`;

  whatsappText =
`🏊 *PRESUPUESTO NEOBIND*

*${m2} m²* — ${colorTexto}

📦 *Envío GRATIS de venecitas*

💎 *Venecitas*
• Transferencia: *$${f(venT)}*
• Tarjeta: *$${f(venC)}*
  (3× $${f(venC/3)})

🛠 *Materiales*
• ${cem} Cemenpox + ${jun} Cemento Blanco
• Transferencia: *$${f(matT)}*
• Tarjeta: *$${f(matC)}*

💰 *TOTAL*
• Transferencia: *$${f(totT)}*
• Tarjeta: *$${f(totC)}*
  (3× $${f(totC/3)})

⚡ _Cotización válida por 3 días_`;

  const out = document.getElementById("budget");
  out.style.display="block";
  out.innerHTML = txt;

  document.getElementById("copyWA").style.display="block";
  document.getElementById("wa").style.display="block";

  document.getElementById("copyWA").onclick = async ()=>{
    await navigator.clipboard.writeText(whatsappText);
    alert("Copiado para WhatsApp ✅");
  };

  document.getElementById("wa").onclick = ()=>{
    const msg = `Hola! Quiero avanzar con ${m2} m²${color ? ` en color ${color}` : ""}`;
    const url = productId
      ? `https://wa.me/p/${productId}/5493425945666?text=${encodeURIComponent(msg)}`
      : `https://wa.me/5493425945666?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
  };
}
</script>

</body>
</html>
