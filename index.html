<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cotizador Neobind</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f5f7;
  margin:0;
}

.container {
  max-width: 520px;
  margin: 40px auto;
  background: #ffffff;
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align:center;
  font-weight:600;
  font-size:22px;
  margin-bottom:6px;
}

.subtitle {
  text-align:center;
  color:#777;
  font-size:14px;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  margin-bottom:20px;
}

.colors {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
  margin-bottom:20px;
}

.color-card {
  padding:14px;
  border-radius:12px;
  border:1px solid #eee;
  cursor:pointer;
  text-align:center;
  font-size:14px;
  transition:0.2s;
}

.color-card:hover {
  transform:translateY(-2px);
}

.color-card.selected {
  border:2px solid #111;
}

.dot {
  width:18px;
  height:18px;
  border-radius:50%;
  margin:0 auto 6px;
}

button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

.budget {
  margin-top:25px;
  background:#fafafa;
  padding:18px;
  border-radius:12px;
  font-size:14px;
  white-space:pre-line;
  border:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

<h2>Cotizá tu pileta</h2>
<div class="subtitle">Venecitas Neobind</div>

<input type="number" id="m2Input" placeholder="Ingresá los m² (ej: 55)" />

<div class="colors">
  <div class="color-card" onclick="sel(this,'Blanco Nácar','3619704621491762')">
    <div class="dot" style="background:#eaeaea"></div>Blanco Nácar
  </div>
  <div class="color-card" onclick="sel(this,'Agua Marina','3597377153718869')">
    <div class="dot" style="background:#00bcd4"></div>Agua Marina
  </div>
  <div class="color-card" onclick="sel(this,'Turquesa','3856030544515788')">
    <div class="dot" style="background:#00a9a5"></div>Turquesa
  </div>
  <div class="color-card" onclick="sel(this,'Azul','3620251704771327')">
    <div class="dot" style="background:#007bff"></div>Azul
  </div>
  <div class="color-card" onclick="sel(this,'Verde Esmeralda','4295199693857459')">
    <div class="dot" style="background:#28a745"></div>Verde Esmeralda
  </div>
  <div class="color-card" onclick="sel(this,'Negro','3511570448947533')">
    <div class="dot" style="background:#222"></div>Negro
  </div>
</div>

<button onclick="calc()">Calcular presupuesto</button>

<div id="budget" class="budget" style="display:none;"></div>

<button id="wa" style="display:none; margin-top:15px;">
  Quiero avanzar por WhatsApp
</button>

</div>

<script>
let color = "";
let productId = "";

function sel(el, c, id){
  color = c;
  productId = id;

  document.querySelectorAll('.color-card').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}

function calc(){
  const m2 = Math.ceil(parseFloat(document.getElementById("m2Input").value));

  if(!m2 || m2<=0) return alert("Ingresá m² válidos");
  if(!color) return alert("Seleccioná un color");

  const f = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");

  const venT = m2*20980;
  const venC = m2*25150;

  const cem = Math.ceil(m2/6);
  const jun = Math.ceil(m2/25);

  const matT = cem*37000 + jun*38000;
  const matC = cem*41500 + jun*43000;

  const totT = venT + matT;
  const totC = venC + matC;

  const txt = `
🏊 Presupuesto Neobind
${m2} m² — ${color}

📦 Envío GRATIS de venecitas

💎 Venecitas
Transferencia: $${f(venT)}
Tarjeta: $${f(venC)} (3× $${f(venC/3)})

🛠 Materiales
${cem} Cemenpox + ${jun} Cemento Blanco
Transferencia: $${f(matT)}
Tarjeta: $${f(matC)}

💰 Total
Transferencia: $${f(totT)}
Tarjeta: $${f(totC)} (3× $${f(totC/3)})

⚡ Cotización válida por 3 días
`;

  document.getElementById("budget").style.display="block";
  document.getElementById("budget").textContent=txt;

  const wa = document.getElementById("wa");
  wa.style.display="block";

  wa.onclick = ()=>{
    const msg = `Hola! Quiero avanzar con ${m2} m² en color ${color}`;
    const url = `https://wa.me/p/${productId}/5493425945666?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
  };
}
</script>

</body>
</html>
